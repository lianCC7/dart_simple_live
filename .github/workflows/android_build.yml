name: Build Android APK

# 允许手动从 Actions 标签页触发此工作流
on:
  workflow_dispatch:

jobs:
  build_android:
    name: Build Flutter Android APK
    # 使用最新的 Ubuntu 虚拟机环境
    runs-on: ubuntu-latest

    steps:
      # 第一步：检出你的仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 第二步：设置 Flutter 环境
      # 使用 subosito/flutter-action 这个流行的 Action 来安装 Flutter
      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          # 你可以指定 Flutter 版本或 channel，'stable' 通常是好的选择
          # 如果项目有特定版本要求，可以在这里指定，例如 '3.16.9'
          channel: 'stable'

      # --- 修改这里 ---
      - name: Get Flutter dependencies
        # 指定工作目录为包含 pubspec.yaml 的子目录
        working-directory: dart_simple_live
        run: flutter pub get

      # --- 修改这里 ---
      - name: Build APK
        # 同样，构建命令也需要在这个子目录中执行
        working-directory: dart_simple_live
        run: flutter build apk --release

      # --- 修改这里 ---
      # 上传产物时，路径需要相对于仓库根目录
      # 构建产物默认在 <working-directory>/build/... 下
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          # 更新路径，加上子目录前缀
          path: dart_simple_live/build/app/outputs/flutter-apk/app-release.apk
